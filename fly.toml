app = "beyond-space-rag-api"
primary_region = "fra"

[build]

[http_service]
  internal_port = 10000
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [[http_service.checks]]
    interval = "15s"
    timeout = "10s"
    grace_period = "90s"
    method = "get"
    path = "/health"

[[vm]]
  memory = "1gb"
  cpus = 1
  memory_mb = 1024